name: Render ODCS Data Contract

on:
  push:
    branches: [main]
    paths:
      - 'datacontract.yaml'
      - '.github/workflows/render-datacontract.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install datacontract-cli
        run: |
          python -m pip install --upgrade pip
          pip install 'datacontract-cli[all]'
      
      - name: 🔍 Lint YAML
        run: datacontract lint datacontract.yaml
      
      - name: 🎨 Export to HTML
        run: |
          mkdir -p docs
          datacontract export --format html \
            --output docs/index.html \
            datacontract.yaml
      
      - name: 📄 Create README
        run: |
          cat > docs/README.md << 'EOF'
          # Data Contract Documentation
          
          Auto-generated by GitHub Actions
          
          [View Contract](./index.html)
          EOF
      
      - name: 📦 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4