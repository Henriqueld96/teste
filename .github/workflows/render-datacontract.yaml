name: Build Data Contract Catalog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install CLI (Minimal)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # ✅ Instala SÓ o necessário (sem [all])
          pip install --no-cache-dir 'datacontract-cli'
        timeout-minutes: 8

      - name: 🔍 Lint all contracts
        run: |
          for contract in contracts/**/datacontract.yaml; do
            datacontract lint "$contract"
          done

      - name: 🎨 Generate Catalog
        run: |
          datacontract catalog \
            --files "contracts/**/datacontract.yaml" \
            --output docs

      - name: 📦 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment